<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOKO Wendelstein</title>
<style>
/* ===== RESET & VARIABLES ===== */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#111214;--s1:#1a1c1f;--s2:#222428;--s3:#2a2d31;
  --border:#333538;--border2:#3d4045;
  --text:#d4d6d9;--dim:#7a7e85;--dim2:#545860;--white:#eceef1;
  --accent:#3d6ab5;--accent2:#5585d4;--hdr:58px;
}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size:14px;
}

/* ===== HEADER ===== */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;height:var(--hdr);
  background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:14px;
}
.hdr-emblem{
  width:34px;height:34px;background:var(--s2);border:1px solid var(--border2);
  border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px;
}
.hdr-name{font-size:15px;font-weight:700;color:var(--white);letter-spacing:0.03em;}
.hdr-sub{font-size:11px;color:var(--dim);margin-top:1px;}
.hdr-sep{width:1px;height:28px;background:var(--border);margin:0 4px;}
.hdr-case{font-size:12px;color:var(--dim);}
.hdr-case span{color:var(--text);}
.hdr-space{flex:1;}
.hdr-live{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--dim);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4a7a4a;box-shadow:0 0 5px rgba(74,122,74,0.5);}
.hdr-menu{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;}

/* ===== LAYOUT ===== */
.layout{margin-top:var(--hdr);display:flex;min-height:calc(100vh - var(--hdr));}

/* ===== SIDEBAR ===== */
.sidebar{
  width:248px;flex-shrink:0;background:var(--s1);
  border-right:1px solid var(--border);overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);}
.sb-section{
  padding:16px 14px 5px;font-size:10px;font-weight:700;
  letter-spacing:0.13em;color:var(--dim2);text-transform:uppercase;
}
.sb-item{
  display:flex;align-items:center;gap:9px;padding:8px 14px;
  cursor:pointer;font-size:13px;color:var(--dim);
  border-left:2px solid transparent;transition:all 0.12s;user-select:none;
}
.sb-item:hover{background:var(--s2);color:var(--text);}
.sb-item.active{background:rgba(61,106,181,0.12);border-left-color:var(--accent2);color:var(--accent2);}
.sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.sb-label{flex:1;}
.sb-count{
  font-size:10px;font-weight:700;background:var(--s3);color:var(--dim);
  padding:1px 7px;border-radius:9px;border:1px solid var(--border2);
}
.sb-divider{height:1px;background:var(--border);margin:6px 14px;}

/* ===== CONTENT ===== */
.content{flex:1;background:var(--bg);position:relative;min-height:calc(100vh - var(--hdr));}

/* ===== PANELS ===== */
.panel{display:none;flex-direction:column;height:calc(100vh - var(--hdr));width:100%;}
.panel.active{display:flex;}
.panel::-webkit-scrollbar{width:4px;}
.panel::-webkit-scrollbar-thumb{background:var(--s3);}

/* ===== PAGE HEADER ===== */
.pg-hdr{
  padding:18px 24px 14px;border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;
}
.pg-hdr h2{font-size:16px;font-weight:600;color:var(--white);margin-bottom:3px;}
.pg-hdr p{font-size:12px;color:var(--dim);}

/* ===== BACK BAR ===== */
.back-bar{
  padding:8px 16px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.back-btn{
  background:var(--s2);border:1px solid var(--border2);color:var(--text);
  font-size:12px;padding:5px 12px;border-radius:4px;cursor:pointer;
  font-family:inherit;transition:all 0.12s;
}
.back-btn:hover{border-color:var(--accent);color:var(--accent2);}
.back-label{font-size:12px;color:var(--dim);}

/* ===== OVERVIEW ===== */
.overview{padding:24px;overflow-y:auto;flex:1;}
.ov-case{
  background:var(--s1);border:1px solid var(--border);border-radius:6px;
  padding:18px;margin-bottom:20px;display:flex;gap:16px;
}
.ov-photo{
  width:84px;height:84px;border-radius:5px;object-fit:cover;
  object-position:center top;flex-shrink:0;
  filter:grayscale(25%);border:1px solid var(--border2);
}
.ov-case h3{font-size:15px;font-weight:600;color:var(--white);margin-bottom:5px;}
.ov-case p{font-size:12.5px;color:var(--dim);line-height:1.65;}
.ov-meta{display:flex;gap:16px;margin-top:9px;flex-wrap:wrap;}
.ov-meta-item{font-size:11px;color:var(--dim);}
.ov-meta-item span{color:var(--text);font-weight:500;}
.ov-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:10px;margin-bottom:20px;
}
.ov-card{
  background:var(--s1);border:1px solid var(--border);border-radius:6px;
  padding:14px;cursor:pointer;transition:all 0.12s;position:relative;
}
.ov-card:hover{border-color:var(--border2);background:var(--s2);}
.ov-card-icon{font-size:20px;margin-bottom:8px;}
.ov-card-title{font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px;}
.ov-card-desc{font-size:11px;color:var(--dim);line-height:1.5;}
.ov-card-count{
  position:absolute;top:12px;right:12px;
  font-size:10px;font-weight:700;background:var(--s3);color:var(--dim);
  padding:1px 7px;border-radius:9px;border:1px solid var(--border2);
}

/* ===== FILE LIST ===== */
.file-list{padding:8px 16px 20px;flex:1;}
.file-row{
  display:flex;align-items:center;gap:12px;padding:11px 12px;
  border-radius:5px;border:1px solid transparent;cursor:pointer;
  margin-bottom:4px;transition:all 0.12s;
}
.file-row:hover{background:var(--s2);border-color:var(--border);}
.file-row.locked{opacity:0.4;cursor:default;}
.file-row.locked:hover{background:transparent;border-color:transparent;}
.f-icon{font-size:22px;flex-shrink:0;}
.f-name{font-size:13px;font-weight:500;color:var(--white);}
.f-meta{font-size:11px;color:var(--dim);margin-top:1px;}
.f-arrow{margin-left:auto;color:var(--dim2);font-size:16px;}

/* ===== MEDIA ===== */
.media-list{padding:16px;overflow-y:auto;flex:1;}
.media-block{
  background:var(--s1);border:1px solid var(--border);
  border-radius:6px;padding:16px;margin-bottom:12px;
}
.media-block h3{font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px;}
.media-block .m-meta{font-size:11px;color:var(--dim);margin-bottom:10px;}
.media-block video,.media-block audio{width:100%;border-radius:4px;background:#000;}
.placeholder{
  background:var(--s2);border:1px dashed var(--border2);
  border-radius:5px;padding:16px;text-align:center;margin-top:8px;
}
.placeholder .ph-icon{font-size:26px;display:block;margin-bottom:6px;}
.placeholder .ph-title{font-size:13px;color:var(--text);font-weight:500;margin-bottom:4px;}
.placeholder .ph-desc{font-size:11.5px;color:var(--dim);line-height:1.6;}
.placeholder code{background:var(--s3);border:1px solid var(--border2);padding:1px 6px;border-radius:3px;font-size:11px;color:var(--accent2);}

/* ===== INDIZIEN ===== */
.indiz-img{width:100%;border-radius:5px;display:block;filter:grayscale(15%);}
.indiz-caption{font-size:11px;color:var(--dim);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:14px;}

/* ===== POSTFACH CONTAINER ===== */
.postfach-container{
  flex:1;overflow:hidden;position:relative;
  background:#1a1d23;
}

/* ===== CHAT CONTAINER ===== */
.chat-container{
  flex:1;overflow:hidden;display:flex;justify-content:center;
  align-items:flex-start;background:#111b21;padding:20px 0;
}

/* ===== MOBILE ===== */
@media(max-width:660px){
  .sidebar{display:none;position:fixed;top:var(--hdr);left:0;bottom:0;z-index:150;width:260px;}
  .sidebar.open{display:flex;flex-direction:column;}
  .hdr-menu{display:block;}
  .hdr-case{display:none;}
  .ov-grid{grid-template-columns:1fr 1fr;}
}

<div id="releaseLoading" class="release-loading">Datenbank wird aktualisiert...<br>Neue Beweismittel werden geladen...</div>
<div class="disclaimer">Fiktives Mock-up für ein Krimispiel. Alle Inhalte sind frei erfunden.</div>
<script>
(function(){
  const RELEASE_KEY = "soko_wendelstein_stage_final_20240623_reset2";
  const params = new URLSearchParams(window.location.search);
  const isAdmin = params.get("admin") === "bertl";

  const steps = [
    {
      question: "Wie heißt die Ziege auf Naxos?",
      accepts: ["mozzarella"],
      unlockText: "Weitere Chatverläufe und Social-Media-Spuren wurden freigegeben."
    },
    {
      question: "Wer eröffnete das erste Caralis Hotel?",
      accepts: ["dimitri caralis","dimitri","caralis dimitri"],
      unlockText: "Das Volksfest-Video wurde freigegeben."
    },
    {
      question: "Was wird getrunken?",
      accepts: ["spaten-bräu","spaten bräu","spaten-braeu","spaten braeu","spatenbraeu","spatenbräu","spaten","spaten brau","spaten-brau"],
      unlockText: "Das Foto Bauhuber, Simone wurde freigegeben."
    },
    {
      question: "Was sieht man im Vordergrund?",
      accepts: ["hund","schwarzer hund","schwarzen hund"],
      unlockText: "Die Ermittlungsbewertung wurde freigegeben."
    },
    {
      question: "Wer steht nach aktuellem Ermittlungsstand am stärksten unter Verdacht?",
      accepts: [
        "noah","noah lopez","lopez",
        "mila","mila brandt",
        "robert","robert brandt",
        "johannes","johannes philipe","dr johannes philipe","dr. johannes philipe","philipe",
        "thomas","thomas becker","becker",
        "albert","bertl","zimmermann","albert zimmermann","bertl zimmermann","albert bertl zimmermann"
      ],
      unlockText: "Die letzten Akten wurden freigegeben."
    }
  ];

  function norm(s){
    return (s||"").toLowerCase().trim()
      .replace(/[„“"']/g,"")
      .replace(/\./g,"")
      .replace(/ü/g,"ue").replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ß/g,"ss")
      .replace(/[‐‑–—]/g,"-")
      .replace(/\s+/g," ");
  }
  function accepted(input, list){
    const n = norm(input);
    return list.some(a => norm(a) === n);
  }
  function getStage(){
    if(isAdmin) return 99;
    const n = parseInt(localStorage.getItem(RELEASE_KEY) || "0", 10);
    return isNaN(n) ? 0 : n;
  }
  function setStage(n){ localStorage.setItem(RELEASE_KEY, String(n)); }

  function required(panel){
    if(panel==="overview" || panel==="emails") return 0;
    if(panel==="smartphones") return 1;
    if(panel==="videos") return 2;
    if(panel==="indizien") return 3;
    if(panel==="zeugen") return 5;
    return 5;
  }
  function panelFromOnclick(el){
    const oc = el.getAttribute("onclick") || "";
    const m = oc.match(/show\('([^']+)'\)/);
    return m ? m[1] : "";
  }

  function applyNav(){
    const stage = getStage();
    document.querySelectorAll("#sidebar .sb-item").forEach(el=>{
      if(!el.dataset.originalHtml) el.dataset.originalHtml = el.innerHTML;
      const p = panelFromOnclick(el);
      if(!p) return;
      if(stage < required(p)){
        el.innerHTML = '<span class="sb-icon">🔒</span><span class="sb-label">Noch nicht freigegeben</span>';
      }else{
        el.innerHTML = el.dataset.originalHtml;
      }
    });
    document.querySelectorAll(".ov-card").forEach(el=>{
      if(!el.dataset.originalHtml) el.dataset.originalHtml = el.innerHTML;
      const p = panelFromOnclick(el);
      if(!p) return;
      if(stage < required(p)){
        el.innerHTML = '<div class="ov-card-icon">🔒</div><div class="ov-card-title">Noch nicht freigegeben</div><div class="ov-card-desc">Neue Ermittlungsdaten werden nach Fortschritt freigeschaltet.</div>';
      }else{
        el.innerHTML = el.dataset.originalHtml;
      }
    });
  }

  function ensureReleaseCard(){
    const overview = document.querySelector("#panel-overview .overview");
    if(!overview) return;
    let card = document.getElementById("releaseCard");
    if(!card){
      card = document.createElement("div");
      card.id = "releaseCard";
      card.className = "release-card";
      overview.appendChild(card);
    }
    renderReleaseCard();
  }

  function renderReleaseCard(){
    const card = document.getElementById("releaseCard");
    if(!card) return;
    const stage = getStage();
    if(stage >= steps.length){
      card.innerHTML = "<h3>Ermittlungsdaten vollständig freigegeben</h3><p>Alle aktuell verfügbaren Ermittlungsdaten sind entsperrt.</p>";
      return;
    }
    const step = steps[stage];
    const suspectHint = stage === 4 ? "<p>Diese Eingabe ist keine finale Bewertung. Weitere Beweismittel können die Ermittlungsrichtung verändern.</p>" : "";
    card.innerHTML = `
      <h3>Nächster Ermittlungsschritt verfügbar</h3>
      ${suspectHint}
      <div class="release-question">${step.question}</div>
      <div class="release-row">
        <input id="releaseInput" class="release-input" autocomplete="off" placeholder="Antwort eingeben">
        <button class="release-btn" id="releaseCheckBtn" type="button">Prüfen</button>
      </div>
      <div id="releaseMsg" class="release-msg"></div>
    `;
    document.getElementById("releaseCheckBtn").addEventListener("click", checkAnswer);
    document.getElementById("releaseInput").addEventListener("keydown", function(e){
      if(e.key === "Enter") checkAnswer();
    });
  }

  function checkAnswer(){
    const stage = getStage();
    const step = steps[stage];
    if(!step) return;
    const input = document.getElementById("releaseInput");
    const msg = document.getElementById("releaseMsg");
    if(!accepted(input.value, step.accepts)){
      msg.textContent = "Antwort nicht erkannt. Bitte prüfen Sie die Ermittlungsunterlagen erneut.";
      msg.className = "release-msg err";
      return;
    }
    msg.textContent = "Freigabe erfolgreich.";
    msg.className = "release-msg ok";
    document.getElementById("releaseLoading").classList.add("show");
    setTimeout(function(){
      setStage(stage+1);
      document.getElementById("releaseLoading").classList.remove("show");
      applyAll();
      if(window.show) window.show("overview");
    }, 800);
  }

  function wrapShow(){
    const originalShow = window.show;
    window.show = function(panel){
      const stage = getStage();
      if(stage < required(panel)){
        if(window.show) originalShow("overview");
        const card = document.getElementById("releaseCard");
        if(card) card.scrollIntoView({behavior:"smooth", block:"center"});
        return;
      }
      return originalShow ? originalShow(panel) : undefined;
    };
  }

  function applyAll(){
    if(isAdmin){
      document.body.classList.add("admin-mode");
      if(!document.querySelector(".admin-badge")){
        const b=document.createElement("div");
        b.className="admin-badge";
        b.textContent="Admin-Modus aktiv";
        document.body.appendChild(b);
      }
    }
    applyNav();
    ensureReleaseCard();
  }

  document.addEventListener("DOMContentLoaded", function(){
    if(isAdmin) setStage(99);
    wrapShow();
    applyAll();
  });
})();
</script>
